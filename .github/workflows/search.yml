name: Future 影视搜索

on:
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复已处理邮件列表
        uses: actions/cache@v4
        with:
          path: future_processed.json
          key: future-processed-v1

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 检查邮箱并搜索
        env:
          EMAIL_ACCOUNT: '3029308562@qq.com'
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: '3029308562@qq.com'
          RECEIVER_EMAIL: '3029308562@qq.com'
          SMTP_SERVER: 'smtp.qq.com'
          SMTP_PORT: '465'
          MAX_ROUNDS: '3'
          PROCESSED_FILE: 'future_processed.json'
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python run.py

      - name: 保存已处理邮件列表
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-cache
          path: future_processed.json
          retention-days: 1
