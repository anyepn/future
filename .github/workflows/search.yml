name: Future 影视搜索

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '电影/动漫名称'
        required: true
        type: string
      max_rounds:
        description: '搜索轮数（默认 5）'
        required: false
        type: string
        default: '5'

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 执行搜索并发送结果
        env:
          SENDER_EMAIL: '3029308562@qq.com'
          RECEIVER_EMAIL: '3029308562@qq.com'
          SMTP_SERVER: 'smtp.qq.com'
          SMTP_PORT: '465'
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run.py
