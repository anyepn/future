name: Future 影视搜索

on:
  # 每 10 分钟自动检查邮箱
  schedule:
    - cron: '*/10 * * * *'

  # 手动触发（备用）
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存已处理邮件列表
        uses: actions/cache@v4
        with:
          path: processed.json
          key: future-processed-emails

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 检查邮箱并执行搜索
        env:
          EMAIL_ACCOUNT: '3029308562@qq.com'
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: '3029308562@qq.com'
          RECEIVER_EMAIL: '3029308562@qq.com'
          SMTP_SERVER: 'smtp.qq.com'
          SMTP_PORT: '465'
        run: python run.py

      - name: 上传已处理邮件列表
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-emails
          path: processed.json
          retention-days: 1
